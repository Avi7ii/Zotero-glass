<?xml-stylesheet type="text/css" href="chrome://zotero-glass/content/preferences.css"?>
<vbox
  id="zotero-glass-preferences-pane"
  class="main-section"
  flex="1"
  onload="Zotero.ZoteroGlass.preferences.init(event.currentTarget)">
  <html:section class="glass-intro">
    <html:div>
      <html:p class="eyebrow">ZOTERO GLASS</html:p>
      <html:p class="intro-copy">调整主窗口、标签和侧栏的玻璃外观。修改会自动保存并立即应用。</html:p>
    </html:div>
    <html:div class="status" id="apply-status">已就绪</html:div>
  </html:section>

  <html:div class="glass-settings">
    <html:section class="card">
      <html:div class="card-heading">
        <html:h2>主窗口</html:h2>
        <html:p>控制资料库窗口的透明度、模糊和原生材质。</html:p>
      </html:div>
      <html:div class="settings-list">
        <html:div class="setting-row">
          <html:div class="setting-copy">
            <html:label for="backgroundTransparency">背景透明度</html:label>
          </html:div>
          <html:input id="backgroundTransparency" type="range" min="0.35" max="0.92" step="0.01" />
          <html:span class="value" id="backgroundTransparency-value"></html:span>
        </html:div>

        <html:div class="setting-row">
          <html:div class="setting-copy">
            <html:label for="blurStrength">模糊强度</html:label>
          </html:div>
          <html:input id="blurStrength" type="range" min="0" max="100" step="1" />
          <html:span class="value" id="blurStrength-value"></html:span>
        </html:div>

        <html:div class="setting-row">
          <html:div class="setting-copy">
            <html:label for="backgroundColor">背景颜色</html:label>
          </html:div>
          <html:input id="backgroundColor" type="color" />
          <html:span class="value" id="backgroundColor-value"></html:span>
        </html:div>

        <html:div class="setting-row material-row">
          <html:div class="setting-copy">
            <html:span class="label">玻璃材质</html:span>
            <html:span class="setting-note">选择系统原生模糊材质</html:span>
          </html:div>
          <html:div class="material-options" id="glassMaterial" role="radiogroup" aria-label="玻璃材质">
            <html:button type="button" class="material-option" data-material="auto">自动</html:button>
            <html:button type="button" class="material-option" data-material="hud">HUD</html:button>
            <html:button type="button" class="material-option" data-material="underWindow">窗口背景</html:button>
            <html:button type="button" class="material-option" data-material="sidebar">侧边栏</html:button>
            <html:button type="button" class="material-option" data-material="menu">菜单</html:button>
            <html:button type="button" class="material-option" data-material="window">普通窗口</html:button>
          </html:div>
          <html:span class="value" id="glassMaterial-value"></html:span>
        </html:div>
      </html:div>
    </html:section>

    <html:section class="card">
      <html:div class="card-heading">
        <html:h2>标签</html:h2>
        <html:p>统一调节状态、#标签和期刊标签的底色。</html:p>
      </html:div>
      <html:div class="settings-list">
        <html:div class="setting-row">
          <html:div class="setting-copy">
            <html:label for="styleTagBackgroundOpacity">所有标签不透明度</html:label>
            <html:span class="setting-note">默认 85%</html:span>
          </html:div>
          <html:input id="styleTagBackgroundOpacity" type="range" min="0.2" max="1" step="0.01" />
          <html:span class="value" id="styleTagBackgroundOpacity-value"></html:span>
        </html:div>
      </html:div>
    </html:section>

    <html:section class="card">
      <html:div class="card-heading">
        <html:h2>侧栏</html:h2>
        <html:p>可跟随主窗口，或使用一套独立的玻璃参数。</html:p>
      </html:div>
      <html:div class="settings-list">
        <html:div class="setting-row">
          <html:div class="setting-copy">
            <html:label for="sidebarIndependent">侧栏独立调节</html:label>
          </html:div>
          <html:label class="switch-control" aria-label="侧栏独立调节">
            <html:input id="sidebarIndependent" class="switch" type="checkbox" />
            <html:span class="switch-track"></html:span>
          </html:label>
          <html:span class="value" id="sidebarIndependent-value"></html:span>
        </html:div>

        <html:section class="sidebar-controls" id="sidebarControls">
          <html:div class="setting-row">
            <html:div class="setting-copy">
              <html:label for="sidebarBackgroundTransparency">侧栏透明度</html:label>
            </html:div>
            <html:input id="sidebarBackgroundTransparency" type="range" min="0.35" max="0.92" step="0.01" />
            <html:span class="value" id="sidebarBackgroundTransparency-value"></html:span>
          </html:div>

          <html:div class="setting-row">
            <html:div class="setting-copy">
              <html:label for="sidebarBlurStrength">侧栏模糊</html:label>
            </html:div>
            <html:input id="sidebarBlurStrength" type="range" min="0" max="100" step="1" />
            <html:span class="value" id="sidebarBlurStrength-value"></html:span>
          </html:div>

          <html:div class="setting-row">
            <html:div class="setting-copy">
              <html:label for="sidebarBackgroundColor">侧栏颜色</html:label>
            </html:div>
            <html:input id="sidebarBackgroundColor" type="color" />
            <html:span class="value" id="sidebarBackgroundColor-value"></html:span>
          </html:div>
        </html:section>
      </html:div>
    </html:section>
  </html:div>

  <html:footer class="glass-actions">
    <html:button class="action quiet" id="reset" type="button">恢复默认</html:button>
    <html:span>所有修改都会自动保存</html:span>
  </html:footer>
</vbox>
